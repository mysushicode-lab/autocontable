version: '3.8'

services:
  comptalibre:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comptalibre-server
    ports:
      - "80:80"        # Application web sur port 80 (production)
      - "2222:22"      # SSH sur port 2222 (optionnel)
    volumes:
      # Persistance des données PostgreSQL
      - postgres_data:/var/lib/postgresql
      # Persistance des documents uploadés
      - documents:/var/www/html/Compta/base/documents
      # Logs
      - logs:/var/log
    environment:
      - TZ=Europe/Paris
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/base"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  documents:
    driver: local
  logs:
    driver: local
